<section class="upload-card">
  <span class="card-label">Entrada</span>

  <div class="dropzone" (click)="fileInput.click()">
    <input #fileInput type="file" accept=".xml" hidden (change)="onFileChange($event)">
    <div class="dropzone-icon">📄</div>
    <p>Arraste o arquivo XML aqui</p>
    <small>ou clique para selecionar · máx. 2MB · .xml</small>
  </div>

  <span class="card-divider">Ou cole o xml</span>

  <textarea class="xml-textarea" placeholder='<?xml version="1.0" encoding="UTF-8"? >'
            [(ngModel)]="xmlTextAreaContent"></textarea>

  <div class="actions-row">
    <button class="analyse-import-bt" (click)="emitValue()"><span>🔍</span> Analisar e Importar</button>
    <button class="example-bt" (click)="fillTextAreaWithExample()">Exemplo</button>
    <button class="clean-bt" (click)="removeTextFromTextArea()">Limpar</button>
  </div>
</section>
